<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر بركة العالمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #00b894;
            --accent-color: #fdcb6e;
            --bg-color: #f8f9fa;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 70px; /* مكان القائمة السفلية */
            background-color: var(--bg-color);
        }

        /* رأس الصفحة الفخم */
        header {
            background: linear-gradient(135deg, #2d3436, #00b894);
            padding: 20px;
            color: white;
            border-radius: 0 0 25px 25px;
            box-shadow: var(--card-shadow);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .search-box {
            background: white;
            border-radius: 12px;
            display: flex;
            padding: 5px 15px;
            align-items: center;
        }

        .search-box input {
            border: none;
            width: 100%;
            padding: 10px;
            font-family: 'Cairo';
            outline: none;
        }

        /* سلايدر العروض */
        .promo-slider {
            margin: 20px;
            height: 150px;
            background: #dfe6e9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #636e72;
            border: 2px dashed #b2bec3;
        }

        /* التصنيفات */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 10px 20px;
            gap: 15px;
        }

        .cat-item {
            min-width: 80px;
            text-align: center;
        }

        .cat-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            box-shadow: var(--card-shadow);
            color: var(--main-color);
            font-size: 24px;
        }

        /* كروت المنتجات */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: var(--card-shadow);
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 120px;
            background: #f1f2f6;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff7675;
            color: white;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 12px;
        }

        /* القائمة السفلية (مثل التطبيقات) */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: #b2bec3;
            font-size: 12px;
            text-decoration: none;
        }

        .nav-item.active {
            color: var(--main-color);
        }

        .nav-item i {
            font-size: 20px;
            display: block;
        }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <span style="font-weight: 800; font-size: 22px;">بركة 🚀</span>
        <i class="fa-regular fa-bell"></i>
    </div>
    <div class="search-box">
        <i class="fa fa-search" style="color: #ccc;"></i>
        <input type="text" placeholder="ماذا تريد أن تطلب اليوم؟">
    </div>
</header>

<div class="promo-slider">
    عرض خاص: خصم 50% على أول طلب! 🎁
</div>

<div class="categories">
    <div class="cat-item"><div class="cat-icon"><i class="fa fa-apple-whole"></i></div><span>فواكه</span></div>
    <div class="cat-item"><div class="cat-icon"><i class="fa fa-laptop"></i></div><span>تقنية</span></div>
    <div class="cat-item"><div class="cat-icon"><i class="fa fa-shirt"></i></div><span>ملابس</span></div>
    <div class="cat-item"><div class="cat-icon"><i class="fa fa-bolt"></i></div><span>عروض</span></div>
</div>

<div class="grid">
    <div class="product-card">
        <div class="badge">مميز</div>
        <div class="product-img"></div>
        <div style="font-weight: bold;">سماعة بلوتوث</div>
        <div style="color: var(--main-color); font-weight: bold;">99.00 ل.س</div>
        <button style="width:100%; border:none; background:var(--main-color); color:white; border-radius:10px; padding:5px; margin-top:5px;">+</button>
    </div>
    <div class="product-card">
        <div class="product-img"></div>
        <div style="font-weight: bold;">ساعة ذكية</div>
        <div style="color: var(--main-color); font-weight: bold;">250.00 ل.س</div>
        <button style="width:100%; border:none; background:var(--main-color); color:white; border-radius:10px; padding:5px; margin-top:5px;">+</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fa fa-home"></i>الرئيسية</a>
    <a href="#" class="nav-item"><i class="fa fa-th-large"></i>الأقسام</a>
    <a href="#" class="nav-item"><i class="fa fa-shopping-basket"></i>سـلتي</a>
    <a href="#" class="nav-item"><i class="fa fa-user"></i>حسابي</a>
</nav>

</body>
</html>
