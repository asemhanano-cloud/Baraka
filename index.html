<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر بركة العالمي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #00b894;
            --accent-color: #fdcb6e;
            --bg-color: #f8f9fa;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding-bottom: 70px;
            background-color: var(--bg-color);
        }

        /* رأس الصفحة */
        header {
            background: linear-gradient(135deg, #2d3436, #00b894);
            padding: 20px;
            color: white;
            border-radius: 0 0 25px 25px;
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            font-weight: 800;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .notification-icon {
            cursor: pointer;
            transition: var(--transition);
            font-size: 20px;
        }

        .notification-icon:hover {
            transform: scale(1.2);
        }

        .search-box {
            background: white;
            border-radius: 12px;
            display: flex;
            padding: 8px 15px;
            align-items: center;
            gap: 10px;
        }

        .search-box input {
            border: none;
            width: 100%;
            padding: 8px;
            font-family: 'Cairo';
            outline: none;
            font-size: 14px;
        }

        /* سلايدر العروض */
        .promo-slider {
            margin: 20px;
            padding: 20px;
            height: 150px;
            background: linear-gradient(135deg, #fdcb6e, #ffeaa7);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #2d3436;
            border: none;
            box-shadow: var(--card-shadow);
            font-size: 18px;
            text-align: center;
        }

        /* التصنيفات */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .categories::-webkit-scrollbar {
            height: 4px;
        }

        .categories::-webkit-scrollbar-thumb {
            background: var(--main-color);
            border-radius: 4px;
        }

        .cat-item {
            min-width: 85px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .cat-item:hover {
            transform: translateY(-5px);
        }

        .cat-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            box-shadow: var(--card-shadow);
            color: var(--main-color);
            font-size: 28px;
            transition: var(--transition);
        }

        .cat-item:hover .cat-icon {
            background: var(--main-color);
            color: white;
            transform: rotate(10deg);
        }

        .cat-item span {
            font-size: 13px;
            font-weight: 600;
            color: #2d3436;
        }

        /* كروت المنتجات */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
            margin-bottom: 10px;
        }

        .product-card {
            background: white;
            border-radius: 20px;
            padding: 12px;
            box-shadow: var(--card-shadow);
            position: relative;
            transition: var(--transition);
            cursor: pointer;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .product-img {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #f1f2f6, #dfe6e9);
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff7675;
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .product-name {
            font-weight: bold;
            font-size: 14px;
            color: #2d3436;
            margin-bottom: 5px;
        }

        .product-price {
            color: var(--main-color);
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .add-btn {
            width: 100%;
            border: none;
            background: var(--main-color);
            color: white;
            border-radius: 10px;
            padding: 8px;
            margin-top: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Cairo';
            font-size: 14px;
        }

        .add-btn:hover {
            background: #00a67d;
            transform: scale(1.05);
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        /* القائمة السفلية */
        nav.bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.08);
            z-index: 1000;
            border-top: 1px solid #eee;
        }

        .nav-item {
            text-align: center;
            color: #b2bec3;
            font-size: 12px;
            text-decoration: none;
            transition: var(--transition);
            flex: 1;
            padding: 8px 0;
            position: relative;
        }

        .nav-item:hover {
            color: var(--main-color);
        }

        .nav-item.active {
            color: var(--main-color);
        }

        .nav-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }

        .cart-badge {
            position: absolute;
            top: 0;
            right: 15px;
            background: #ff7675;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }

        /* نافذة الإشعارات */
        .toast {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: var(--main-color);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            animation: slideIn 0.3s ease;
            z-index: 999;
            font-size: 14px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="top-bar">
        <div class="logo">
            <span>بركة</span>
            <span>🚀</span>
        </div>
        <i class="fa-regular fa-bell notification-icon"></i>
    </div>
    <div class="search-box">
        <i class="fa fa-search" style="color: #ccc;"></i>
        <input type="text" id="searchInput" placeholder="ماذا تريد أن تطلب؟">
    </div>
</header>

<div class="promo-slider">
    🎁 عرض خاص: خصم 50% على أول طلب! استمتع بتجربة تسوق رائعة
</div>

<div class="categories">
    <div class="cat-item" data-category="all"><div class="cat-icon"><i class="fa fa-th"></i></div><span>الكل</span></div>
    <div class="cat-item" data-category="fruits"><div class="cat-icon"><i class="fa fa-apple-whole"></i></div><span>فواكه</span></div>
    <div class="cat-item" data-category="tech"><div class="cat-icon"><i class="fa fa-laptop"></i></div><span>تقنية</span></div>
    <div class="cat-item" data-category="clothes"><div class="cat-icon"><i class="fa fa-shirt"></i></div><span>ملابس</span></div>
    <div class="cat-item" data-category="offers"><div class="cat-icon"><i class="fa fa-bolt"></i></div><span>عروض</span></div>
</div>

<div class="grid" id="productsGrid">
    <!-- المنتجات ستُضاف هنا بواسطة JavaScript -->
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><i class="fa fa-home"></i>الرئيسية</a>
    <a href="#" class="nav-item"><i class="fa fa-th-large"></i>الأقسام</a>
    <a href="#" class="nav-item" id="cartNav"><i class="fa fa-shopping-basket"></i>سلتي<span class="cart-badge" id="cartCount" style="display:none;">0</span></a>
    <a href="#" class="nav-item"><i class="fa fa-user"></i>حسابي</a>
</nav>

<script>
    // بيانات المنتجات
    const products = [
        { id: 1, name: 'سماعة بلوتوث', price: 99, category: 'tech', emoji: '🎧', badge: 'مميز' },
        { id: 2, name: 'ساعة ذكية', price: 250, category: 'tech', emoji: '⌚' },
        { id: 3, name: 'تفاح طازج', price: 45, category: 'fruits', emoji: '🍎' },
        { id: 4, name: 'موز عضوي', price: 35, category: 'fruits', emoji: '🍌' },
        { id: 5, name: 'قميص كلاسيكي', price: 120, category: 'clothes', emoji: '👕' },
        { id: 6, name: 'بنطلون جينز', price: 180, category: 'clothes', emoji: '👖' },
        { id: 7, name: 'خصم خاص 40%', price: 199, category: 'offers', emoji: '💰', badge: 'ساخن' },
        { id: 8, name: 'هاتف محمول', price: 899, category: 'tech', emoji: '📱' }
    ];

    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let selectedCategory = 'all';

    // تحديث عداد السلة
    function updateCartCount() {
        const count = cart.length;
        const cartBadge = document.getElementById('cartCount');
        if (count > 0) {
            cartBadge.textContent = count;
            cartBadge.style.display = 'flex';
        } else {
            cartBadge.style.display = 'none';
        }
    }

    // عرض الإشعارات
    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.style.animation = 'slideIn 0.3s ease reverse';
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    }

    // تصفية المنتجات
    function filterProducts(category) {
        selectedCategory = category;
        displayProducts();
    }

    // عرض المنتجات
    function displayProducts() {
        const grid = document.getElementById('productsGrid');
        const searchValue = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = products.filter(p => {
            const matchesCategory = selectedCategory === 'all' || p.category === selectedCategory;
            const matchesSearch = p.name.toLowerCase().includes(searchValue);
            return matchesCategory && matchesSearch;
        });

        grid.innerHTML = filtered.map(product => `
            <div class="product-card">
                ${product.badge ? `<div class="badge">${product.badge}</div>` : ''}
                <div class="product-img">${product.emoji}</div>
                <div class="product-name">${product.name}</div>
                <div class="product-price">${product.price}.00 ل.س</div>
                <button class="add-btn" onclick="addToCart(${product.id})">
                    <i class="fa fa-plus"></i> أضف للسلة
                </button>
            </div>
        `).join('');
    }

    // إضافة للسلة
    function addToCart(productId) {
        const product = products.find(p => p.id === productId);
        cart.push(product);
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        showToast(`✅ تم إضافة ${product.name} إلى السلة!`);
    }

    // معالجات الأحداث
    document.getElementById('searchInput').addEventListener('input', displayProducts);

    document.querySelectorAll('.cat-item').forEach(item => {
        item.addEventListener('click', (e) => {
            document.querySelectorAll('.cat-item').forEach(el => el.style.opacity = '0.7');
            item.style.opacity = '1';
            filterProducts(item.dataset.category);
        });
    });

    document.querySelector('.notification-icon').addEventListener('click', () => {
        showToast('🔔 لا توجد إشعارات جديدة');
    });

    // التهيئة الأولية
    displayProducts();
    updateCartCount();
</script>

</body>
</html>
